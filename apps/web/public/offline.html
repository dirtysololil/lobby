<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <meta name="theme-color" content="#101826" />
    <title>Lobby Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family:
          "Segoe UI",
          system-ui,
          sans-serif;
        background:
          radial-gradient(circle at top, rgba(72, 151, 255, 0.16), transparent 36%),
          linear-gradient(180deg, #0a0f16 0%, #09101a 100%);
        color: #f5f7fb;
      }

      .card {
        width: min(100%, 420px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 24px;
        background: rgba(12, 18, 27, 0.92);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      }

      .eyebrow {
        margin: 0 0 12px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #8ca4c5;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.08;
      }

      p {
        margin: 14px 0 0;
        color: #b6c4d8;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        margin-top: 18px;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        padding: 0 16px;
        border-radius: 14px;
        background: #7fb4ff;
        color: #102038;
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Lobby</p>
      <h1>Нет соединения</h1>
      <p>
        Приложение не может связаться с сервером. Как только интернет вернётся,
        Lobby снова подхватит ваши данные.
      </p>
      <a href="/">Повторить попытку</a>
    </main>
  </body>
</html>
