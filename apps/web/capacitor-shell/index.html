<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Lobby</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: #091018;
        color: #f4f7fb;
        font:
          16px/1.4 Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        display: grid;
        place-items: center;
      }

      .shell {
        max-width: 18rem;
        padding: 1rem 1.25rem;
        border-radius: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(20, 29, 40, 0.94);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="shell">Lobby mobile shell</main>
  </body>
</html>
